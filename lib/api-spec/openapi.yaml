openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HireLoop Campus Recruitment Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: students
    description: Student profile and resume operations
  - name: jobs
    description: Job posting operations
  - name: applications
    description: Job application operations
  - name: recruiters
    description: Recruiter operations
  - name: admin
    description: Placement admin operations
  - name: ai
    description: AI analysis operations
  - name: announcements
    description: Announcement board operations
  - name: dashboard
    description: Dashboard summary endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Students
  /students/profile:
    get:
      operationId: getStudentProfile
      tags: [students]
      summary: Get student profile
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
    put:
      operationId: updateStudentProfile
      tags: [students]
      summary: Update student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /students/resume:
    get:
      operationId: getResume
      tags: [students]
      summary: Get student resume data
      responses:
        "200":
          description: Resume data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"
    put:
      operationId: updateResume
      tags: [students]
      summary: Update resume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeBody"
      responses:
        "200":
          description: Updated resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"

  # Jobs
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all active jobs
      parameters:
        - in: query
          name: branch
          schema:
            type: string
        - in: query
          name: minCgpa
          schema:
            type: number
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [active, closed, all]
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update job posting
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete job posting
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Applications
  /applications:
    get:
      operationId: listMyApplications
      tags: [applications]
      summary: List current student applications
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: applyToJob
      tags: [applications]
      summary: Apply to a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyJobBody"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{applicationId}/status:
    put:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status (recruiter/admin)
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationStatusBody"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /jobs/{jobId}/applications:
    get:
      operationId: getJobApplications
      tags: [applications]
      summary: Get all applicants for a job (recruiter)
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: Applicants list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithStudent"

  # AI
  /ai/analyze-resume:
    post:
      operationId: analyzeResume
      tags: [ai]
      summary: AI resume analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeResumeBody"
      responses:
        "200":
          description: Resume analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAnalysis"

  /ai/mock-interview/start:
    post:
      operationId: startMockInterview
      tags: [ai]
      summary: Start a mock interview session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartInterviewBody"
      responses:
        "200":
          description: Interview session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSession"

  /ai/mock-interview/{sessionId}/answer:
    post:
      operationId: submitInterviewAnswer
      tags: [ai]
      summary: Submit answer and get next question
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerBody"
      responses:
        "200":
          description: AI feedback and next question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerFeedback"

  /ai/mock-interview/{sessionId}/summary:
    get:
      operationId: getInterviewSummary
      tags: [ai]
      summary: Get interview session summary
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSummary"

  /ai/interview-sessions:
    get:
      operationId: listInterviewSessions
      tags: [ai]
      summary: List student interview sessions
      responses:
        "200":
          description: Interview sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterviewSession"

  # Announcements
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List all announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{announcementId}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete announcement (admin)
      parameters:
        - in: path
          name: announcementId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Dashboard & Analytics
  /dashboard/student:
    get:
      operationId: getStudentDashboard
      tags: [dashboard]
      summary: Student dashboard summary
      responses:
        "200":
          description: Student dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDashboard"

  /dashboard/recruiter:
    get:
      operationId: getRecruiterDashboard
      tags: [dashboard]
      summary: Recruiter dashboard summary
      responses:
        "200":
          description: Recruiter dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterDashboard"

  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      summary: Admin dashboard summary with placement analytics
      responses:
        "200":
          description: Admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /dashboard/placement-stats:
    get:
      operationId: getPlacementStats
      tags: [dashboard]
      summary: Branch-wise and company-wise placement stats
      responses:
        "200":
          description: Placement statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlacementStats"

  # Admin
  /admin/students:
    get:
      operationId: listStudents
      tags: [admin]
      summary: List all students (admin)
      parameters:
        - in: query
          name: branch
          schema:
            type: string
        - in: query
          name: placed
          schema:
            type: boolean
      responses:
        "200":
          description: Students list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentProfile"

  /admin/recruiters:
    get:
      operationId: listRecruiters
      tags: [admin]
      summary: List all recruiters (admin)
      responses:
        "200":
          description: Recruiters list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecruiterProfile"

  /admin/recruiters/{recruiterId}/approve:
    put:
      operationId: approveRecruiter
      tags: [admin]
      summary: Approve or reject a recruiter (admin)
      parameters:
        - in: path
          name: recruiterId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRecruiterBody"
      responses:
        "200":
          description: Updated recruiter status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterProfile"

  /recruiters/profile:
    get:
      operationId: getRecruiterProfile
      tags: [recruiters]
      summary: Get recruiter profile
      responses:
        "200":
          description: Recruiter profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterProfile"
    put:
      operationId: updateRecruiterProfile
      tags: [recruiters]
      summary: Update recruiter profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecruiterProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterProfile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [student, recruiter, admin]
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, role, name, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        role:
          type: string
          enum: [student, recruiter]
      required: [email, password, name, role]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    StudentProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        branch:
          type: string
        batch:
          type: string
        cgpa:
          type: number
        skills:
          type: array
          items:
            type: string
        bio:
          type: string
        linkedinUrl:
          type: string
        githubUrl:
          type: string
        placementStatus:
          type: string
          enum: [unplaced, placed, internship]
        placedCompany:
          type: string
        packageLpa:
          type: number
        resumeScore:
          type: integer
        profileCompleteness:
          type: integer
        totalApplications:
          type: integer
        shortlisted:
          type: integer
        offers:
          type: integer
      required: [id, userId, name, email, branch, batch, cgpa, skills, placementStatus, profileCompleteness]

    UpdateStudentProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        branch:
          type: string
        batch:
          type: string
        cgpa:
          type: number
        skills:
          type: array
          items:
            type: string
        bio:
          type: string
        linkedinUrl:
          type: string
        githubUrl:
          type: string

    Resume:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        summary:
          type: string
        experience:
          type: array
          items:
            $ref: "#/components/schemas/ExperienceEntry"
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationEntry"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectEntry"
        certifications:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string
        atsScore:
          type: integer
        lastUpdated:
          type: string
          format: date-time
      required: [id, studentId, summary, experience, education, projects, certifications, languages]

    UpdateResumeBody:
      type: object
      properties:
        summary:
          type: string
        experience:
          type: array
          items:
            $ref: "#/components/schemas/ExperienceEntry"
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationEntry"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectEntry"
        certifications:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string

    ExperienceEntry:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        duration:
          type: string
        description:
          type: string
      required: [title, company, duration]

    EducationEntry:
      type: object
      properties:
        degree:
          type: string
        institution:
          type: string
        year:
          type: string
        gpa:
          type: string
      required: [degree, institution, year]

    ProjectEntry:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tech:
          type: array
          items:
            type: string
        link:
          type: string
      required: [title, description, tech]

    Job:
      type: object
      properties:
        id:
          type: integer
        recruiterId:
          type: integer
        title:
          type: string
        company:
          type: string
        description:
          type: string
        location:
          type: string
        salaryMin:
          type: number
        salaryMax:
          type: number
        eligibleBranches:
          type: array
          items:
            type: string
        minCgpa:
          type: number
        batchYear:
          type: string
        deadline:
          type: string
          format: date-time
        jobType:
          type: string
          enum: [fulltime, internship, contract]
        status:
          type: string
          enum: [active, closed, pending]
        applicantCount:
          type: integer
        skills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, recruiterId, title, company, description, eligibleBranches, minCgpa, deadline, jobType, status, applicantCount, skills, createdAt]

    CreateJobBody:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        description:
          type: string
        location:
          type: string
        salaryMin:
          type: number
        salaryMax:
          type: number
        eligibleBranches:
          type: array
          items:
            type: string
        minCgpa:
          type: number
        batchYear:
          type: string
        deadline:
          type: string
          format: date-time
        jobType:
          type: string
          enum: [fulltime, internship, contract]
        skills:
          type: array
          items:
            type: string
      required: [title, company, description, eligibleBranches, minCgpa, deadline, jobType, skills]

    Application:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        jobId:
          type: integer
        status:
          type: string
          enum: [applied, shortlisted, interview, offer, rejected]
        appliedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        job:
          $ref: "#/components/schemas/Job"
        interviewDate:
          type: string
          format: date-time
        notes:
          type: string
      required: [id, studentId, jobId, status, appliedAt, updatedAt]

    ApplicationWithStudent:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        jobId:
          type: integer
        status:
          type: string
          enum: [applied, shortlisted, interview, offer, rejected]
        appliedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        student:
          $ref: "#/components/schemas/StudentProfile"
        interviewDate:
          type: string
          format: date-time
        notes:
          type: string
      required: [id, studentId, jobId, status, appliedAt, updatedAt]

    ApplyJobBody:
      type: object
      properties:
        jobId:
          type: integer
      required: [jobId]

    UpdateApplicationStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [applied, shortlisted, interview, offer, rejected]
        interviewDate:
          type: string
          format: date-time
        notes:
          type: string
      required: [status]

    AnalyzeResumeBody:
      type: object
      properties:
        jobDescription:
          type: string
      required: []

    ResumeAnalysis:
      type: object
      properties:
        atsScore:
          type: integer
        matchPercentage:
          type: integer
        keywordGaps:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        strengths:
          type: array
          items:
            type: string
        sectionScores:
          type: object
          properties:
            summary:
              type: integer
            experience:
              type: integer
            skills:
              type: integer
            projects:
              type: integer
            education:
              type: integer
          required: [summary, experience, skills, projects, education]
      required: [atsScore, matchPercentage, keywordGaps, suggestions, strengths, sectionScores]

    StartInterviewBody:
      type: object
      properties:
        role:
          type: string
        level:
          type: string
          enum: [fresher, junior, mid]
      required: [role]

    InterviewSession:
      type: object
      properties:
        sessionId:
          type: string
        role:
          type: string
        level:
          type: string
        status:
          type: string
          enum: [active, completed]
        currentQuestion:
          type: string
        questionNumber:
          type: integer
        totalQuestions:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        overallScore:
          type: integer
      required: [sessionId, role, level, status, questionNumber, totalQuestions, startedAt]

    SubmitAnswerBody:
      type: object
      properties:
        answer:
          type: string
      required: [answer]

    AnswerFeedback:
      type: object
      properties:
        feedback:
          type: string
        score:
          type: integer
        nextQuestion:
          type: string
        isComplete:
          type: boolean
        improvementTip:
          type: string
      required: [feedback, score, isComplete]

    InterviewSummary:
